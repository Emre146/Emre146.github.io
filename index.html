<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home – Emre Yalçin</title>
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-dark">

    <div id="navbar"></div>
    <script>
        fetch("nav.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("navbar").innerHTML = html;
                const currentPage = location.pathname.split("/").pop().replace(".html", "") || "index";
                document.querySelectorAll("#navbar [data-page]").forEach(link => {
                    if (link.dataset.page === currentPage) {
                        link.classList.add("active");
                        link.setAttribute("aria-current", "page");
                    }
                });
            });
    </script>

    <!-- HERO -->
    <div class="container-fluid text-white flex-grow-1 d-flex align-items-center bg-dark">
        <div class="row w-100 align-items-center">

            <div class="col-12 col-md-6 ps-5">
                <h1 class="fw-bold display-3">
                    Welkom op mijn portfolio website!
                </h1>
                <p class="mt-3 fs-5">
                    Op deze website kom je meer te weten over mij en de verschillende projecten die ik heb gemaakt.
                </p>
            </div>

            <div class="col-12 col-md-6 col-lg-5 text-center">
                <img src="img/neppefoto.jpg" class="img-fluid rounded" alt="Foto van Emre Yalçin"
                    style="max-height: 500px;">
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-black text-white text-center py-3 mt-auto">
        <a href="https://www.linkedin.com/in/emre-yalcin-a0b648398/" class="text-white" target="_blank"
            rel="noopener"><i class="bi bi-linkedin"></i></a>
        <p class="mb-0">
            <a href="mailto:302678499@student.rocmondriaan.nl" class="text-white">
                302678499@student.rocmondriaan.nl</a>
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
